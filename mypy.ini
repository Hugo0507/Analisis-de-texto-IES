[mypy]
# Configuración global de mypy para el proyecto
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_calls = False
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_optional = True
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Ignorar errores en bibliotecas de terceros sin stubs
ignore_missing_imports = True

# Configuración por módulo
[mypy-tests.*]
# Tests pueden ser menos estrictos
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-pages.*]
# Pages de Streamlit pueden ser menos estrictos
disallow_untyped_defs = False

[mypy-src.*]
# Módulos src deben tener type hints
check_untyped_defs = True

# Configuración específica para módulos con muchas dependencias externas
[mypy-src.models.*]
# Modelos ML pueden requerir más flexibilidad
disallow_untyped_calls = False

[mypy-nltk.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

