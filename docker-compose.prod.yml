# ============================================================================
# Docker Compose - Production Configuration
# ============================================================================
# Orchestrates all services for production deployment

version: '3.9'

services:
  # Database Service - MySQL
  mysql:
    image: mysql:8.0
    container_name: nlp_mysql_prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db_backups:/backups
    ports:
      - "3306:3306"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Cache Service - Redis
  redis:
    image: redis:7-alpine
    container_name: nlp_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend Service - Django REST + Channels
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: nlp_backend_prod
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/1
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
      - ENVIRONMENT=production
    volumes:
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/mediafiles:/app/mediafiles
      - ./backend/logs:/var/log/django
      - ./backend/cache:/app/cache
      - ./backend/credentials:/app/credentials
    ports:
      - "8000:8000"
    networks:
      - app_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput --clear &&
        gunicorn config.wsgi:application
          --config gunicorn.conf.py
      "

  # WebSocket Service - Django Channels with Daphne
  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: nlp_websocket_prod
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_URL=redis://redis:6379/2
    volumes:
      - ./backend/logs:/var/log/django
    ports:
      - "8001:8001"
    networks:
      - app_network
    depends_on:
      - mysql
      - redis
      - backend
    command: >
      daphne -b 0.0.0.0 -p 8001 config.asgi:application

  # Frontend Service - React + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL}
        - REACT_APP_WS_BASE_URL=${REACT_APP_WS_BASE_URL}
        - REACT_APP_ENV=production
    container_name: nlp_frontend_prod
    restart: always
    ports:
      - "80:80"
    networks:
      - app_network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # (Optional) Nginx Reverse Proxy
  # Uncomment to use nginx as a reverse proxy instead of exposing services directly
  # nginx:
  #   image: nginx:alpine
  #   container_name: nlp_nginx_prod
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - ./backend/staticfiles:/var/www/static:ro
  #     - ./backend/mediafiles:/var/www/media:ro
  #   networks:
  #     - app_network
  #   depends_on:
  #     - backend
  #     - frontend

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
