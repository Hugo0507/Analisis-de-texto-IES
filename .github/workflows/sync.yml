name: Sync to Hugging Face
on:
  push:
    branches: [main] # Se activa cuando subes algo a la rama main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Hugo0507:$HF_TOKEN@huggingface.co/spaces/Hugo0507/analisis-ies
