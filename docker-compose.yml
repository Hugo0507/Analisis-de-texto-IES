version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: analisis_td_mysql
    restart: always
    environment:
      MYSQL_DATABASE: analisis_transformacion_digital
      MYSQL_USER: analisis_user
      MYSQL_PASSWORD: analisis_password_2024
      MYSQL_ROOT_PASSWORD: root_password_2024
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - analisis_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: analisis_td_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - analisis_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend - Django REST Framework
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: analisis_td_backend
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-change-this-in-production-2024
      - DATABASE_URL=mysql://analisis_user:analisis_password_2024@mysql:3306/analisis_transformacion_digital
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - analisis_network

  # Frontend - React + TypeScript
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: analisis_td_frontend
    restart: always
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api/v1
      - REACT_APP_WS_URL=ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - analisis_network
    stdin_open: true
    tty: true

# Volumes
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local

# Networks
networks:
  analisis_network:
    driver: bridge
