[pytest]
# Configuración de pytest para el proyecto

# Directorio de tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py

# Patrón de clases de test
python_classes = Test*

# Patrón de funciones de test
python_functions = test_*

# Opciones por defecto
addopts =
    # Verbose output
    -v
    # Mostrar resumen de tests
    -ra
    # Mostrar warnings
    --strict-markers
    # Coverage (si está instalado)
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    # Detener en primer fallo (comentar para ejecutar todos)
    # -x
    # Mostrar print statements
    -s

# Markers personalizados para categorizar tests
markers =
    unit: Tests unitarios (funciones individuales)
    integration: Tests de integración (múltiples componentes)
    slow: Tests que toman mucho tiempo
    drive: Tests que requieren conexión a Google Drive
    nlp: Tests de procesamiento de lenguaje natural
    ml: Tests de machine learning
    smoke: Tests de humo (verificación básica)
    regression: Tests de regresión

# Timeout por defecto (en segundos) - requiere pytest-timeout
# timeout = 300

# Configuración de coverage
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */config.py

[coverage:report]
# Porcentaje mínimo de cobertura para pasar
fail_under = 60
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Excluir líneas de pragma
    pragma: no cover
    # Excluir funciones de debug
    def __repr__
    # Excluir bloques de error no alcanzables
    raise AssertionError
    raise NotImplementedError
    # Excluir condiciones de tipo
    if TYPE_CHECKING:
    # Excluir main
    if __name__ == .__main__.:
    # Excluir pass
    pass
    # Excluir abstract methods
    @abstractmethod
